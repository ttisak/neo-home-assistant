<!doctype html>
<html>
  <head>
    <title>NEO Smartbox Standalone Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background-color: #111;
        color: white;
        margin: 0;
        padding: 16px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        margin-bottom: 24px;
      }

      .card {
        background-color: #1c1c1c;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 500;
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      button {
        background-color: #0288d1;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        cursor: pointer;
        transition:
          background-color 0.2s,
          transform 0.1s;
      }

      button:hover {
        background-color: #01579b;
      }

      button:active {
        transform: scale(0.95);
      }

      .button-big {
        grid-column: span 3;
      }

      .power-button {
        background-color: #e53935;
      }

      .power-button:hover {
        background-color: #c62828;
      }

      .ok-button {
        background-color: #29b6f6;
        font-weight: bold;
      }

      .ok-button:hover {
        background-color: #0288d1;
      }

      .section-title {
        margin: 16px 0 8px 0;
        font-size: 14px;
        color: #888;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 16px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-align: center;
      }

      #status {
        background-color: #222;
        border-radius: 8px;
        padding: 12px;
        margin-top: 16px;
        min-height: 20px;
        font-family: monospace;
      }

      .settings {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
      }

      input,
      select {
        background-color: #333;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>NEO Smartbox Remote</h1>

      <div class="card">
        <div class="settings">
          <label for="deviceId">Device ID:</label>
          <input
            type="text"
            id="deviceId"
            value="ACB687EAE8C8"
            placeholder="e.g. ACB687EAE8C8"
          />

          <label for="apiKey">API Key:</label>
          <input type="password" id="apiKey" placeholder="Enter your API key" />

          <button class="button-big" onclick="saveSettings()">
            Save Settings
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">NEO Smartbox Remote Control</div>
        </div>

        <div class="section-title">Power</div>
        <div class="button-grid">
          <button
            class="button-big power-button"
            onclick="sendCommand('Power')"
          >
            Power
          </button>
        </div>

        <div class="section-title">Navigation</div>
        <div class="button-grid">
          <div></div>
          <button onclick="sendCommand('Up')">Up</button>
          <div></div>

          <button onclick="sendCommand('Left')">Left</button>
          <button class="ok-button" onclick="sendCommand('Ok')">OK</button>
          <button onclick="sendCommand('Right')">Right</button>

          <div></div>
          <button onclick="sendCommand('Down')">Down</button>
          <div></div>
        </div>

        <div class="section-title">Control</div>
        <div class="button-grid">
          <button onclick="sendCommand('Back')">Back</button>
          <button onclick="sendCommand('Home')">Home</button>
          <button onclick="sendCommand('Menu')">Menu</button>
        </div>

        <div class="section-title">Media Control</div>
        <div class="button-grid">
          <button onclick="sendCommand('Rewind')">⏪</button>
          <button onclick="sendCommand('PlayPause')">⏯️</button>
          <button onclick="sendCommand('FastForward')">⏩</button>
        </div>

        <div class="section-title">Volume</div>
        <div class="button-grid">
          <button onclick="sendCommand('VolumeDown')">Vol -</button>
          <button onclick="sendCommand('Mute')">Mute</button>
          <button onclick="sendCommand('VolumeUp')">Vol +</button>
        </div>

        <div class="section-title">Voice</div>
        <div class="button-grid">
          <button class="button-big" onclick="sendCommand('VoiceSearch')">
            Voice Search
          </button>
        </div>

        <div id="status">Ready</div>
      </div>
    </div>

    <script>
      // Load settings from localStorage when page loads
      document.addEventListener("DOMContentLoaded", function () {
        const deviceId = localStorage.getItem("deviceId");
        const apiKey = localStorage.getItem("apiKey");

        if (deviceId) document.getElementById("deviceId").value = deviceId;
        if (apiKey) document.getElementById("apiKey").value = apiKey;

        updateStatus("Ready. Settings loaded from browser storage.");
      });

      function saveSettings() {
        const deviceId = document.getElementById("deviceId").value;
        const apiKey = document.getElementById("apiKey").value;

        localStorage.setItem("deviceId", deviceId);
        localStorage.setItem("apiKey", apiKey);

        updateStatus("Settings saved to browser storage.");
      }

      function updateStatus(message) {
        const status = document.getElementById("status");
        status.textContent = message;
      }

      function sendCommand(keyName) {
        const deviceId = document.getElementById("deviceId").value;
        const apiKey = document.getElementById("apiKey").value;

        if (!deviceId || !apiKey) {
          updateStatus("Error: Please fill in Device ID and API Key fields.");
          return;
        }

        updateStatus(`Sending command: ${keyName} to device ${deviceId}...`);

        const apiUrl =
          "https://stargate.telekom.si/api/titan.tv.CompanionService/SendKeyAction";

        const payload = {
          device_id: deviceId,
          key_name: keyName,
          key_repeat: 0,
          long_press: true,
        };

        fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `APIGW-AUTH-TOK ${apiKey}`,
          },
          body: JSON.stringify(payload),
        })
          .then((response) => {
            if (response.ok) {
              updateStatus(`Command '${keyName}' sent successfully.`);
              return response.text();
            } else {
              return response.text().then((text) => {
                throw new Error(
                  `${response.status} ${response.statusText} - ${text}`,
                );
              });
            }
          })
          .then((data) => {
            console.log("Success:", data);
          })
          .catch((error) => {
            updateStatus(`Error: ${error.message}`);
            console.error("Error:", error);
          });
      }
    </script>
  </body>
</html>
