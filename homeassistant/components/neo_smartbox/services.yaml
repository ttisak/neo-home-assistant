remote_key_action:
  target:
    entity:
      integration: neo_smartbox
      domain: remote
    device:
      integration: neo_smartbox
  fields:
    action:
      required: true
      selector:
        select:
          translation_key: "remote_key_actions"
          options:
            - power
            - rewind
            - play_pause
            - forward
            - up
            - down
            - left
            - right
            - ok
            - back
            - home
            - menu
            - volume_down
            - volume_mute
            - volume_up
            - channel_up
            - channel_down
    long_press:
      required: false
      default: false
      selector:
        boolean:
